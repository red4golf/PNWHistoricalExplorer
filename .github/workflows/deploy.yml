name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        env:
          # Used for canonical URLs, sitemap, and OG tags.
          # Change this if you attach a custom domain later.
          SITE_URL: https://red4golf.github.io
          # Amazon Associates tag — set as a repo *variable* (Settings →
          # Secrets and variables → Actions → Variables). Falls back to the
          # value in src/data/site.json if unset.
          PUBLIC_AMAZON_TAG: ${{ vars.PUBLIC_AMAZON_TAG }}
          # GoatCounter site code (the subdomain of your goatcounter.com URL).
          PUBLIC_GOATCOUNTER_CODE: ${{ vars.PUBLIC_GOATCOUNTER_CODE }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
